<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Simba Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
        }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center bg-white p-4 rounded-2xl shadow-xl mb-4 border border-slate-700">
                <i data-lucide="shield-admin" class="w-10 h-10 text-blue-600"></i>
            </div>
            <h1 class="text-3xl font-black italic tracking-tighter uppercase text-white">
                Admin <span class="text-blue-600">Portal</span>
            </h1>
            <p class="text-gray-400 text-sm mt-2 font-medium uppercase tracking-widest">System Administration</p>
        </div>

        <div class="glass rounded-3xl shadow-2xl overflow-hidden border border-white/20">
            <div class="p-8">
                <h2 class="text-2xl font-black uppercase tracking-widest text-gray-900 mb-2">Reset Password</h2>
                <p class="text-gray-600 text-sm mb-6">Enter your new password</p>

                <div id="errorMessage" class="hidden mb-6 p-3 bg-red-50 border-l-4 border-red-600 text-red-700 text-xs font-bold flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-4 h-4"></i>
                    <span id="errorText">Error message.</span>
                </div>

                <div id="successMessage" class="hidden mb-6 p-3 bg-green-50 border-l-4 border-green-600 text-green-700 text-xs font-bold flex items-center gap-2">
                    <i data-lucide="check-circle" class="w-4 h-4"></i>
                    <span id="successText">Success message.</span>
                </div>

                <form id="resetPasswordForm" onsubmit="handleResetPassword(event)" class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-1 ml-1">New Password</label>
                        <input type="password" id="newPassword" placeholder="••••••••" required minlength="8" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 transition text-sm">
                        <p class="text-[10px] text-gray-500 mt-1 ml-1">Minimum 8 characters</p>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-1 ml-1">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="8" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-600/20 focus:border-blue-600 transition text-sm">
                    </div>
                    <button type="submit" id="resetBtn" class="w-full bg-slate-900 text-white font-black uppercase tracking-widest py-4 rounded-xl hover:bg-blue-600 transition-all flex items-center justify-center gap-2 shadow-lg">
                        <span>Reset Password</span>
                        <i data-lucide="key" class="w-4 h-4"></i>
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <a href="admin-login.html" class="text-blue-600 text-xs font-bold hover:underline">Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tokenValid = false;

        // Check if user has a valid recovery token
        async function checkRecoveryToken() {
            if (!window.supabaseClient) {
                console.error('Supabase client not initialized');
                setTimeout(checkRecoveryToken, 500);
                return;
            }

            try {
                // Log the current hash/URL to debug
                console.log('Current URL:', window.location.href);
                console.log('Current hash:', window.location.hash);

                // Get the session which should contain the recovery token from the email link
                const { data: { session }, error } = await window.supabaseClient.auth.getSession();
                
                if (error) {
                    console.error('Session error:', error);
                    throw error;
                }

                if (session) {
                    console.log('Valid recovery session found');
                    tokenValid = true;
                    showSuccess('Your token is valid. Enter your new password.');
                    document.getElementById('resetPasswordForm').style.display = 'block';
                } else {
                    console.log('No session found - waiting for token...');
                    // Session might be loaded via hash, give it a moment
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    const { data: { session: sessionRetry }, error: errorRetry } = await window.supabaseClient.auth.getSession();
                    
                    if (sessionRetry) {
                        console.log('Session found after retry');
                        tokenValid = true;
                        showSuccess('Your token is valid. Enter your new password.');
                        document.getElementById('resetPasswordForm').style.display = 'block';
                    } else {
                        console.warn('No session available');
                        showError('Invalid or expired token. Please request a new password reset email.');
                        document.getElementById('resetPasswordForm').style.display = 'none';
                    }
                }
            } catch (err) {
                console.error('Error checking recovery token:', err);
                showError('Error checking token: ' + (err.message || 'Unknown error'));
                document.getElementById('resetPasswordForm').style.display = 'none';
            }
        }

        async function handleResetPassword(e) {
            e.preventDefault();

            if (!tokenValid) {
                showError('Invalid token. Please try again.');
                return;
            }

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showError('Passwords do not match. Please try again.');
                return;
            }

            // Validate password length
            if (newPassword.length < 8) {
                showError('Password must be at least 8 characters.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'Resetting...';

            try {
                const { error } = await window.supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if (error) {
                    showError(error.message || 'Error resetting password');
                    console.error('Update error:', error);
                } else {
                    showSuccess('Password reset successfully! Redirecting to login...');
                    document.getElementById('resetPasswordForm').style.display = 'none';
                    
                    // Sign out after password reset
                    await window.supabaseClient.auth.signOut();
                    
                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'admin-login.html';
                    }, 3000);
                }
            } catch (err) {
                console.error('Error resetting password:', err);
                showError('Error resetting password: ' + (err.message || 'Unknown error'));
            }

            btn.disabled = false;
            btn.innerHTML = 'Reset Password';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            document.getElementById('errorText').innerText = message;
            errorDiv.classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            document.getElementById('successText').innerText = message;
            successDiv.classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
        }

        // Check recovery token when page loads
        window.addEventListener('load', checkRecoveryToken);

        // Also check if page is still being loaded
        checkRecoveryToken();
    </script>
</body>
</html>
