            font-size: 14px;

        .button-group {

            border: none;
            border-radius: 6px;
            font-size: 14px;

        .btn-setup {

            color: white;
        }
        .btn-setup:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        .btn-setup:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-admin {
            background: #f0f4ff;
            color: #667eea;
            border: 1px solid #667eea;
        }
        .btn-admin:hover {
            background: #e8ecff;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
            display: none;
        }
        .status.loading {
            background: #fff3cd;
            color: #856404;
            display: block;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
            border: 1px solid #f5c6cb;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .merchant-stats {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 13px;
            display: none;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .stat-item:last-child {
            border-bottom: none;
        }
        .stat-label {
            color: #666;
            font-weight: 500;
        }
        .stat-value {
            color: #333;
            font-weight: 600;

                            clearInterval(check);

                            window.supabaseClient = supabaseClient;
                            console.log('Supabase initialized');
