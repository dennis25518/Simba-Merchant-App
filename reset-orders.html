<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Orders to Pending</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 4px;
            color: #333;
            font-size: 14px;
            line-height: 1.6;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-reset {
            background: #e74c3c;
            color: white;
        }
        .btn-reset:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(231, 76, 60, 0.4);
        }
        .btn-reset:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-admin {
            background: #f0f4ff;
            color: #667eea;
            border: 1px solid #667eea;
        }
        .btn-admin:hover {
            background: #e8ecff;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
            display: none;
        }
        .status.loading {
            background: #fff3cd;
            color: #856404;
            display: block;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
            border: 1px solid #f5c6cb;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Reset Orders</h1>
        <p class="subtitle">Reset all orders to pending status for testing</p>

        <div class="info-box">
            <strong>What this does:</strong><br>
            Changes all orders back to pending status (regardless of current status). This allows the auto-matching system to process them again. Clear any routing_error messages too.
        </div>

        <div class="button-group">
            <button class="btn-reset" onclick="resetOrders()">⚠️ Reset All Orders</button>
            <button class="btn-admin" onclick="goToAdmin()">→ Go to Admin</button>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script async defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        async function resetOrders() {
            const btn = document.querySelector('.btn-reset');
            const status = document.getElementById('status');

            btn.disabled = true;
            status.className = 'status loading';
            status.innerHTML = '<span class="spinner"></span>Waiting for Supabase...';

            try {
                // Wait for Supabase to be ready
                let attempts = 0;
                while (!window.supabaseClient && attempts < 50) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    attempts++;
                }
                
                if (!window.supabaseClient) {
                    throw new Error('Failed to initialize Supabase - client not available');
                }
                
                status.innerHTML = '<span class="spinner"></span>Resetting orders...';

                // Reset all orders to pending only
                const { data, error } = await window.supabaseClient
                    .from('orders')
                    .update({
                        order_status: 'pending'
                    })
                    .gte('id', 0); // Update all rows (id is always >= 0)

                if (error) {
                    throw error;
                }

                status.className = 'status success';
                status.innerHTML = '✅ All orders reset to pending! Ready to test auto-matching.';

                setTimeout(() => {
                    window.location.href = 'admin-dash.html';
                }, 2000);

            } catch (error) {
                console.error('Reset error:', error);
                status.className = 'status error';
                status.innerHTML = `❌ Error: ${error.message}`;
                btn.disabled = false;
            }
        }

        function goToAdmin() {
            window.location.href = 'admin-dash.html';
        }
    </script>
</body>
</html>
